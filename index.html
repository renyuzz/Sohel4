<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>訃聞填寫與檢視系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif; }
    input[type="text"] { font-size: 16px; background-color: white; } 
  </style>
</head>
<body class="bg-gray-50">
  
  <div id="root"></div>

  <script>
    const { useState, useRef, createElement: h } = React;

    // --- SVG 圖示 (轉換為純 JS 元件) ---
    const IconUser = () => h('svg', { width: 20, height: 20, className: "text-gray-600", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }, h('path', { d: "M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" }), h('circle', { cx: 12, cy: 7, r: 4 }));
    const IconCalendar = () => h('svg', { width: 20, height: 20, className: "text-gray-600", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }, h('rect', { width: 18, height: 18, x: 3, y: 4, rx: 2, ry: 2 }), h('line', { x1: 16, x2: 16, y1: 2, y2: 6 }), h('line', { x1: 8, x2: 8, y1: 2, y2: 6 }), h('line', { x1: 3, x2: 21, y1: 10, y2: 10 }));
    const IconFileText = () => h('svg', { width: 20, height: 20, className: "text-gray-600", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin="round" }, h('path', { d: "M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" }), h('polyline', { points: "14 2 14 8 20 8" }), h('line', { x1: 16, x2: 8, y1: 13, y2: 13 }), h('line', { x1: 16, x2: 8, y1: 17, y2: 17 }));
    const IconUsers = () => h('svg', { width: 20, height: 20, className: "text-gray-600", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin="round" }, h('path', { d: "M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" }), h('circle', { cx: 9, cy: 7, r: 4 }));
    const IconEye = () => h('svg', { width: 20, height: 20, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2" }, h('path', { d: "M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" }), h('circle', { cx: 12, cy: 12, r: 3 }));
    const IconEdit3 = () => h('svg', { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2" }, h('path', { d: "M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" }));
    const IconDownload = () => h('svg', { width: 20, height: 20, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2" }, h('path', { d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" }));
    const IconHeartHandshake = () => h('svg', { width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2" }, h('path', { d: "M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" }));

    const familyFields = [
      { label: '孝男', key: 'son' }, { label: '孝婦', key: 'daughterInLaw' },
      { label: '孝女', key: 'daughter' }, { label: '孝女婿', key: 'sonInLaw' },
      { label: '孝孫', key: 'grandson' }, { label: '孝孫媳', key: 'grandsonInLaw' },
      { label: '孝孫女', key: 'granddaughter' }, { label: '孝孫婿', key: 'grandsonInLaw2' },
      { label: '孝外孫', key: 'mGrandson' }, { label: '孝外孫媳', key: 'mGrandsonInLaw_x' },
      { label: '孝外孫女', key: 'mGranddaughter' }, { label: '孝外孫婿', key: 'mGranddaughterInLaw_x' },
      { label: '曾孫', key: 'greatGrandson' }, { label: '曾孫女', key: 'greatGranddaughter' },
      { label: '外曾孫', key: 'mGreatGrandson' }, { label: '外曾孫女', key: 'mGreatGranddaughter' },
      { label: '胞兄', key: 'brother' }, { label: '胞兄嫂', key: 'sisterInLaw' },
      { label: '胞弟', key: 'yBrother' }, { label: '胞弟媳', key: 'ySisterInLaw' },
      { label: '胞姊', key: 'sister' }, { label: '胞姊夫', key: 'brotherInLaw' },
      { label: '胞妹', key: 'ySister' }, { label: '胞妹婿', key: 'yBrotherInLaw' },
    ];

    const InputField = ({ label, value, onChange, placeholder = '', type = 'text', list }) => 
      h('div', { className: "flex flex-col mb-3" },
        h('label', { className: "text-sm font-medium text-gray-700 mb-1" }, label),
        h('input', {
          type, list, value: value || '', placeholder: placeholder || `請輸入${label}`,
          className: "w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400 text-base",
          onChange: (e) => onChange(e.target.value)
        })
      );

    const SectionTitle = ({ icon, title }) => 
      h('div', { className: "flex items-center space-x-2 pb-2 mb-4 border-b border-gray-200 text-gray-800" },
        h(icon),
        h('h2', { className: "text-lg font-bold" }, title)
      );

    const PreviewRow = ({ label, value }) => {
      if (!value) return null;
      return h('div', { className: "flex border-b border-gray-100 py-2 last:border-0" },
        h('span', { className: "w-1/3 text-gray-500 font-medium" }, label),
        h('span', { className: "w-2/3 text-gray-900" }, value)
      );
    };

    const ObituarySystem = () => {
      const [viewMode, setViewMode] = useState('edit');
      const [isDownloading, setIsDownloading] = useState(false);
      const previewRef = useRef(null);

      const [formData, setFormData] = useState({
        deceased: { name: '', birthSolar: '', birthLunar: '', deathSolar: '', deathLunar: '', deathTime: '', restingPlace: '', coffinPlace: '', religion: '' },
        ceremony: { date: '', location: '', familyTime: '', publicTime: '' },
        sender: { name: '', contactAddress: '', phone: '' },
        family: familyFields.reduce((acc, curr) => ({ ...acc, [curr.key]: '' }), {})
      });

      const handleChange = (section, field, value) => {
        setFormData(prev => ({ ...prev, [section]: { ...prev[section], [field]: value } }));
      };

      const handleDownloadImage = async () => {
        if (!previewRef.current) return;
        setIsDownloading(true);
        try {
          const canvas = await window.html2canvas(previewRef.current, { scale: 2, backgroundColor: '#ffffff' });
          const link = document.createElement('a');
          link.href = canvas.toDataURL('image/jpeg', 0.9);
          link.download = `${formData.deceased.name || '訃聞'}_資料核對.jpg`;
          link.click();
        } catch (error) {
          alert("圖片產生失敗");
        } finally {
          setIsDownloading(false);
        }
      };

      const filledFamily = familyFields.filter(f => formData.family[f.key]?.trim() !== '');

      return h('div', { className: "min-h-screen bg-gray-50 text-gray-800 font-sans sm:py-6" },
        h('div', { className: "max-w-md mx-auto relative min-h-screen sm:min-h-0" },
          h('header', { className: "bg-gray-800 text-white p-4 shadow-md sticky top-0 z-10 sm:rounded-t-2xl flex justify-between items-center" },
            h('div', { className: "flex items-center space-x-2" }, h(IconHeartHandshake), h('h1', { className: "text-lg font-bold tracking-wide" }, "訃聞資料系統")),
            h('div', { className: "text-sm bg-gray-700 px-3 py-1 rounded-full" }, viewMode === 'edit' ? '填寫中' : '核對模式')
          ),
          h('main', { className: "p-4 bg-white sm:shadow-lg sm:rounded-b-2xl pb-24" },
            viewMode === 'edit' ? h('div', { className: "space-y-6" },
              h('div', { className: "bg-white p-2" },
                h(SectionTitle, { icon: IconUser, title: "亡者資訊" }),
                h(InputField, { label: "亡者姓名", value: formData.deceased.name, onChange: v => handleChange('deceased', 'name', v) }),
                h('div', { className: "grid grid-cols-2 gap-3" },
                  h(InputField, { label: "生 (國曆)", value: formData.deceased.birthSolar, placeholder: "35/01/01", onChange: v => handleChange('deceased', 'birthSolar', v) }),
                  h(InputField, { label: "生 (農曆)", value: formData.deceased.birthLunar, placeholder: "五月初五", onChange: v => handleChange('deceased', 'birthLunar', v) }),
                  h(InputField, { label: "歿 (國曆)", value: formData.deceased.deathSolar, placeholder: "113/12/31", onChange: v => handleChange('deceased', 'deathSolar', v) }),
                  h(InputField, { label: "歿 (農曆)", value: formData.deceased.deathLunar, placeholder: "七月十五", onChange: v => handleChange('deceased', 'deathLunar', v) })
                ),
                h(InputField, { label: "歿 (時間)", value: formData.deceased.deathTime, list: "time-options", placeholder: "上午 10:30", onChange: v => handleChange('deceased', 'deathTime', v) }),
                h('div', { className: "grid grid-cols-2 gap-3" },
                  h(InputField, { label: "停靈", value: formData.deceased.restingPlace, onChange: v => handleChange('deceased', 'restingPlace', v) }),
                  h(InputField, { label: "停柩", value: formData.deceased.coffinPlace, onChange: v => handleChange('deceased', 'coffinPlace', v) })
                ),
                h(InputField, { label: "宗教別", value: formData.deceased.religion, placeholder: "例如：佛教", onChange: v => handleChange('deceased', 'religion', v) })
              ),
              h('div', { className: "bg-white p-2" },
                h(SectionTitle, { icon: IconCalendar, title: "告別式資訊" }),
                h(InputField, { label: "告別式日期", value: formData.ceremony.date, placeholder: "113/01/15", onChange: v => handleChange('ceremony', 'date', v) }),
                h(InputField, { label: "告別式地點", value: formData.ceremony.location, onChange: v => handleChange('ceremony', 'location', v) }),
                h('div', { className: "grid grid-cols-2 gap-3" },
                  h(InputField, { label: "家祭時間", value: formData.ceremony.familyTime, list: "time-options", placeholder: "上午 08:00", onChange: v => handleChange('ceremony', 'familyTime', v) }),
                  h(InputField, { label: "公祭時間", value: formData.ceremony.publicTime, list: "time-options", placeholder: "上午 09:00", onChange: v => handleChange('ceremony', 'publicTime', v) })
                )
              ),
              h('div', { className: "bg-white p-2" },
                h(SectionTitle, { icon: IconFileText, title: "發文者資訊" }),
                h(InputField, { label: "發文者", value: formData.sender.name, onChange: v => handleChange('sender', 'name', v) }),
                h(InputField, { label: "聯絡處", value: formData.sender.contactAddress, onChange: v => handleChange('sender', 'contactAddress', v) }),
                h(InputField, { label: "電話", value: formData.sender.phone, onChange: v => handleChange('sender', 'phone', v) })
              ),
              h('div', { className: "bg-white p-2" },
                h(SectionTitle, { icon: IconUsers, title: "家屬名單" }),
                h('div', { className: "grid grid-cols-2 gap-x-4 gap-y-1" },
                  familyFields.map(f => h(InputField, { key: f.key, label: f.label, value: formData.family[f.key], placeholder: "姓名", onChange: v => handleChange('family', f.key, v) }))
                )
              )
            ) : h('div', { ref: previewRef, className: "bg-white p-5 rounded-xl border border-gray-200" },
              h('h2', { className: "text-xl font-bold text-center mb-6 text-gray-800 tracking-widest" }, formData.deceased.name ? `${formData.deceased.name} 訃聞資料核對` : '訃聞資料核對'),
              h('div', { className: "mb-6" },
                h(SectionTitle, { icon: IconUser, title: "亡者資訊" }),
                h(PreviewRow, { label: "姓名", value: formData.deceased.name }),
                h(PreviewRow, { label: "生 (國曆)", value: formData.deceased.birthSolar }),
                h(PreviewRow, { label: "生 (農曆)", value: formData.deceased.birthLunar }),
                h(PreviewRow, { label: "歿 (國曆)", value: formData.deceased.deathSolar }),
                h(PreviewRow, { label: "歿 (農曆)", value: formData.deceased.deathLunar }),
                h(PreviewRow, { label: "歿 (時間)", value: formData.deceased.deathTime }),
                h(PreviewRow, { label: "停靈", value: formData.deceased.restingPlace }),
                h(PreviewRow, { label: "停柩", value: formData.deceased.coffinPlace }),
                h(PreviewRow, { label: "宗教別", value: formData.deceased.religion })
              ),
              h('div', { className: "mb-6" },
                h(SectionTitle, { icon: IconCalendar, title: "告別式資訊" }),
                h(PreviewRow, { label: "日期", value: formData.ceremony.date }),
                h(PreviewRow, { label: "地點", value: formData.ceremony.location }),
                h(PreviewRow, { label: "家祭", value: formData.ceremony.familyTime }),
                h(PreviewRow, { label: "公祭", value: formData.ceremony.publicTime })
              ),
              h('div', { className: "mb-6" },
                h(SectionTitle, { icon: IconFileText, title: "發文者資訊" }),
                h(PreviewRow, { label: "發文者", value: formData.sender.name }),
                h(PreviewRow, { label: "聯絡處", value: formData.sender.contactAddress }),
                h(PreviewRow, { label: "電話", value: formData.sender.phone })
              ),
              h('div', null,
                h(SectionTitle, { icon: IconUsers, title: "家屬名單" }),
                filledFamily.length === 0 ? h('p', { className: "text-gray-400 italic text-sm py-2" }, "尚未填寫家屬名單") :
                  h('div', { className: "grid grid-cols-1 gap-2 mt-2" },
                    filledFamily.map(f => h('div', { key: f.key, className: "flex" },
                      h('span', { className: "w-1/3 text-gray-500 font-medium" }, f.label),
                      h('span', { className: "w-2/3 text-gray-900" }, formData.family[f.key])
                    ))
                  )
              )
            ),
            h('datalist', { id: "time-options" },
              ["上午 07:00", "上午 08:00", "上午 09:00", "上午 10:00", "中午 12:00", "下午 02:00", "下午 03:00"].map(t => h('option', { key: t, value: t }))
            )
          ),
          h('div', { className: "fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 sm:max-w-md sm:mx-auto z-20" },
            viewMode === 'edit' ? 
              h('button', {
                onClick: () => setViewMode('preview'),
                className: "w-full bg-gray-800 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center space-x-2 hover:bg-gray-700"
              }, h(IconEye), h('span', null, "預覽與核對資料"))
              :
              h('div', { className: "flex space-x-3" },
                h('button', {
                  onClick: () => setViewMode('edit'),
                  className: "w-1/3 bg-gray-100 text-gray-800 font-bold py-3 px-2 rounded-xl flex items-center justify-center space-x-1 border border-gray-300 hover:bg-gray-200"
                }, h(IconEdit3), h('span', { className: "text-sm" }, "返回修改")),
                h('button', {
                  onClick: handleDownloadImage, disabled: isDownloading,
                  className: "w-2/3 bg-blue-600 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center space-x-2 hover:bg-blue-700 disabled:opacity-50"
                }, h(IconDownload), h('span', null, isDownloading ? '產生圖片中...' : '下載為圖片'))
              )
          )
        )
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(ObituarySystem));
  </script>
</body>
</html>
